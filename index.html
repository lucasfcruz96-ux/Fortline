  return (

        </div>
        <div style={{padding:"22px 24px"}}>{children}</div>
      </div>
    </div>
  );
}

      <p style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 8px"}}>{label}</p>
      <p style={{fontSize:22,fontWeight:800,color:C.white,margin:"0 0 4px",lineHeight:1}}>{value}</p>
      {sub&&<p style={{fontSize:12,color:trend==="up"?C.success:trend==="down"?C.danger:C.muted,margin:0}}>{sub}</p>}
    </div>
  );
}

// ── CHART COMPONENTS (Chart.js) ───────────────────────────────────────────────
function BarChartComp({data}){
  const ref=useRef(null); const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{
      type:"bar",
      data:{
        labels:data.map(d=>d.mes),
        datasets:[
          {label:"Entradas",data:data.map(d=>d.Entradas),backgroundColor:"#34D399",borderRadius:4,borderSkipped:false},
          {label:"Saídas",data:data.map(d=>d.Saidas),backgroundColor:"#F87171",borderRadius:4,borderSkipped:false}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:C.surfaceMid,borderColor:C.border,borderWidth:1,titleColor:C.white,bodyColor:C.muted,padding:10,callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}`}}},scales:{x:{grid:{display:false},ticks:{color:C.muted,font:{size:12}},border:{display:false}},y:{grid:{color:C.border},ticks:{color:C.muted,font:{size:11},callback:v=>`R$${(v/1000).toFixed(0)}k`},border:{display:false}}}}
    });
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[data]);
  return <div style={{position:"relative",height:200}}><canvas ref={ref}></canvas></div>;
}

function LineChartComp({data}){
  const ref=useRef(null); const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{
      type:"line",
      data:{
        labels:data.map(d=>d.mes),
        datasets:[{label:"Saldo",data:data.map(d=>d.Saldo),borderColor:C.gold,backgroundColor:`${C.gold}18`,borderWidth:2.5,pointBackgroundColor:C.gold,pointRadius:5,fill:true,tension:0.3}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:C.surfaceMid,borderColor:C.border,borderWidth:1,titleColor:C.white,bodyColor:C.muted,padding:10,callbacks:{label:ctx=>`Saldo: ${fmt(ctx.raw)}`}}},scales:{x:{grid:{display:false},ticks:{color:C.muted,font:{size:12}},border:{display:false}},y:{grid:{color:C.border},ticks:{color:C.muted,font:{size:11},callback:v=>`R$${(v/1000).toFixed(0)}k`},border:{display:false}}}}
    });
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[data]);
  return <div style={{position:"relative",height:200}}><canvas ref={ref}></canvas></div>;
}

function PieChartComp({data}){
  const ref=useRef(null); const inst=useRef(null);
  const COLS=[C.danger,C.warning,C.info,C.purple,C.success,C.muted];
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{
      type:"doughnut",
      data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.value),backgroundColor:data.map((_,i)=>COLS[i%COLS.length]),borderWidth:2,borderColor:C.surface,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{display:false},tooltip:{backgroundColor:C.surfaceMid,borderColor:C.border,borderWidth:1,titleColor:C.white,bodyColor:C.muted,padding:10,callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)}`}}}}
    });
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[data]);
  return(
    <div style={{display:"flex",gap:16,alignItems:"center"}}>
      <div style={{position:"relative",height:160,width:160,flexShrink:0}}><canvas ref={ref}></canvas></div>
      <div style={{flex:1}}>
        {data.map((item,i)=>(
          <div key={item.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <div style={{width:8,height:8,borderRadius:2,background:COLS[i%COLS.length],flexShrink:0}}/>
              <span style={{fontSize:12,color:C.muted}}>{item.name}</span>
            </div>
            <span style={{fontSize:12,fontWeight:700,color:C.white}}>{fmt(item.value)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── ABA AGENDA ────────────────────────────────────────────────────────────────
function AgendaTab({services,setServices}){
  const[calY,setCalY]=useState(Y);
  const[calM,setCalM]=useState(M);
  const[fCat,setFCat]=useState("");
  const[fSt,setFSt]=useState("");
  const[fRe,setFRe]=useState("");
  const[modalOpen,setModalOpen]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[detailItem,setDetailItem]=useState(null);
  const empty={name:"",category:"Limpeza de Terreno",date:"",time:"",client:"",description:"",status:"planejado",valuePlanned:"",valueActual:"",responsible:"Pedro"};
  const[form,setForm]=useState(empty);

  const openCreate=day=>{setEditItem(null);const d=day?`${calY}-${String(calM+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`:"";setForm({...empty,date:d});setModalOpen(true);};
  const openEdit=item=>{setEditItem(item);setForm({...item,valuePlanned:item.valuePlanned||"",valueActual:item.valueActual||""});setModalOpen(true);setDetailItem(null);};
  const del=id=>{setServices(s=>s.filter(x=>x.id!==id));setDetailItem(null);};
  const save=()=>{
    if(!form.name||!form.date)return;
    const obj={...form,valuePlanned:Number(form.valuePlanned)||0,valueActual:Number(form.valueActual)||0};
    if(editItem)setServices(s=>s.map(x=>x.id===editItem.id?{...x,...obj}:x));
    else setServices(s=>[...s,{...obj,id:genId()}]);
    setModalOpen(false);
  };

  const daysInMonth=new Date(calY,calM+1,0).getDate();
  const firstDay=new Date(calY,calM,1).getDay();

  const filtered=services.filter(sv=>{
    if(fCat&&sv.category!==fCat)return false;
    if(fSt&&sv.status!==fSt)return false;
    if(fRe&&sv.responsible!==fRe)return false;
    return true;
  });
  const monthSvcs=filtered.filter(sv=>{const[sy,sm]=sv.date.split("-").map(Number);return sy===calY&&sm-1===calM;});
  const getDaySvcs=day=>{const d=`${calY}-${String(calM+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;return monthSvcs.filter(sv=>sv.date===d);};

  const todaySvcs=services.filter(sv=>sv.date===todayStr);
  const upcoming=services.filter(sv=>sv.date>todayStr&&sv.status!=="cancelado").slice(0,5);
  const overdue=services.filter(sv=>sv.date<todayStr&&(sv.status==="planejado"||sv.status==="em_andamento"));

  const prevMonth=()=>{let nm=calM-1,ny=calY;if(nm<0){nm=11;ny--;}setCalM(nm);setCalY(ny);};
  const nextMonth=()=>{let nm=calM+1,ny=calY;if(nm>11){nm=0;ny++;}setCalM(nm);setCalY(ny);};

  return(
    <div>
      <SectionHeader title="Agenda de Serviços" subtitle={`${MONTHS_PT[calM]} ${calY}`} action={<button style={S.btn} onClick={()=>openCreate(null)}><Ico.Plus z={15} c="#07111F"/>Novo Serviço</button>}/>
      {/* Filtros */}
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <select style={{...S.select,flex:1,minWidth:150}} value={fCat} onChange={e=>setFCat(e.target.value)}>
          <option value="">Todas Categorias</option>
          {CATEGORIES.map(c=><option key={c}>{c}</option>)}
        </select>
        <select style={{...S.select,flex:1,minWidth:140}} value={fSt} onChange={e=>setFSt(e.target.value)}>
          <option value="">Todos Status</option>
          {Object.entries(STATUS_SVC).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
        <select style={{...S.select,flex:1,minWidth:120}} value={fRe} onChange={e=>setFRe(e.target.value)}>
          <option value="">Responsável</option>
          {["Pedro","Lucas","Rodrigo"].map(r=><option key={r}>{r}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 270px",gap:18}}>
        {/* CALENDÁRIO */}
        <div style={{...S.card,padding:0,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:`1px solid ${C.border}`}}>
            <button className="action-btn" style={{...S.btnGhost,padding:"7px 12px"}} onClick={prevMonth}><Ico.ChevL z={16} c={C.gold}/></button>
            <span style={{fontWeight:800,fontSize:15,color:C.white}}>{MONTHS_PT[calM]} {calY}</span>
            <button className="action-btn" style={{...S.btnGhost,padding:"7px 12px"}} onClick={nextMonth}><Ico.ChevR z={16} c={C.gold}/></button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.surfaceMid}}>
            {DAYS_PT.map(d=><div key={d} style={{textAlign:"center",padding:"9px 0",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:C.border}}>
            {Array.from({length:firstDay}).map((_,i)=>(
              <div key={`e${i}`} style={{background:C.surface,minHeight:84,padding:6,opacity:0.3}}/>
            ))}
            {Array.from({length:daysInMonth}).map((_,i)=>{
              const day=i+1;
              const dayStr=`${calY}-${String(calM+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const daySvcs=getDaySvcs(day);
              const isToday=dayStr===todayStr;
              return(
                <div key={day} className="cal-day" style={{background:C.surface,minHeight:84,padding:6,cursor:"pointer",borderTop:isToday?`2px solid ${C.gold}`:"none",position:"relative",transition:"background 0.12s"}} onClick={()=>daySvcs.length===0&&openCreate(day)}>
                  <div style={{fontSize:12,fontWeight:isToday?800:500,color:isToday?C.gold:C.white,marginBottom:4,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isToday?`${C.gold}20`:"transparent"}}>{day}</div>
                  {daySvcs.slice(0,3).map(sv=>(
                    <div key={sv.id} style={{display:"flex",alignItems:"center",gap:3,background:`${CAT_COLORS[sv.category]}18`,border:`1px solid ${CAT_COLORS[sv.category]}40`,borderRadius:4,padding:"2px 4px",marginBottom:2,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setDetailItem(sv);}}>
                      <CatIcon category={sv.category} z={9}/>
                      <span style={{fontSize:9,color:CAT_COLORS[sv.category],fontWeight:600,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",maxWidth:"calc(100% - 13px)"}}>{sv.name}</span>
                    </div>
                  ))}
                  {daySvcs.length>3&&<div style={{fontSize:9,color:C.muted}}>+{daySvcs.length-3}</div>}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,padding:"12px 20px",borderTop:`1px solid ${C.border}`}}>
            {CATEGORIES.map(cat=>(
              <div key={cat} style={{display:"flex",alignItems:"center",gap:5}}>
                <CatIcon category={cat} z={11}/>
                <span style={{fontSize:10,color:C.muted}}>{cat}</span>
              </div>
            ))}
          </div>
        </div>
        {/* SIDEBAR */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={S.cardSm}>
            <p style={{fontSize:10,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 10px"}}>Hoje</p>
            {todaySvcs.length===0?<p style={{fontSize:13,color:C.muted}}>Nenhum serviço</p>:todaySvcs.map(sv=>(
              <div key={sv.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,cursor:"pointer"}} onClick={()=>setDetailItem(sv)}>
                <div style={{width:6,height:6,borderRadius:"50%",background:STATUS_SVC[sv.status]?.color||C.muted,flexShrink:0}}/>
                <div><p style={{fontSize:12,color:C.white,margin:0,fontWeight:600}}>{sv.name}</p><p style={{fontSize:10,color:C.muted,margin:0}}>{sv.time} · {sv.responsible}</p></div>
              </div>
            ))}
          </div>
          <div style={S.cardSm}>
            <p style={{fontSize:10,fontWeight:700,color:C.info,textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 10px"}}>Próximos</p>
            {upcoming.length===0?<p style={{fontSize:13,color:C.muted}}>Nenhum</p>:upcoming.map(sv=>(
              <div key={sv.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,cursor:"pointer"}} onClick={()=>setDetailItem(sv)}>
                <CatIcon category={sv.category} z={12}/>
                <div><p style={{fontSize:12,color:C.white,margin:0,fontWeight:600,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",maxWidth:170}}>{sv.name}</p><p style={{fontSize:10,color:C.muted,margin:0}}>{fmtD(sv.date)}</p></div>
              </div>
            ))}
          </div>
          {overdue.length>0&&(
            <div style={{...S.cardSm,borderColor:`${C.danger}50`}}>
              <p style={{fontSize:10,fontWeight:700,color:C.danger,textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 10px"}}>⚠ Atrasados</p>
              {overdue.map(sv=>(
                <div key={sv.id} style={{cursor:"pointer",marginBottom:8}} onClick={()=>setDetailItem(sv)}>
                  <p style={{fontSize:12,color:C.danger,margin:"0 0 1px",fontWeight:600}}>{sv.name}</p>
                  <p style={{fontSize:10,color:C.muted,margin:0}}>{fmtD(sv.date)}</p>
                </div>
              ))}
            </div>
          )}
          <div style={S.cardSm}>
            <p style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 10px"}}>Resumo do Mês</p>
            {Object.entries(STATUS_SVC).map(([k,v])=>{
              const count=monthSvcs.filter(s=>s.status===k).length;
              return(
                <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                  <span style={{fontSize:12,color:C.muted}}>{v.label}</span>
                  <span style={{fontSize:13,fontWeight:700,color:v.color}}>{count}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Detalhe */}
      {detailItem&&(
        <Modal title="Detalhe do Serviço" onClose={()=>setDetailItem(null)}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
            <div style={{width:42,height:42,borderRadius:12,background:`${CAT_COLORS[detailItem.category]}20`,display:"flex",alignItems:"center",justifyContent:"center"}}><CatIcon category={detailItem.category} z={22}/></div>
            <div style={{flex:1}}>
              <p style={{margin:0,fontWeight:800,fontSize:16,color:C.white}}>{detailItem.name}</p>
              <p style={{margin:0,fontSize:12,color:C.muted}}>{detailItem.category}</p>
            </div>
            <Badge label={STATUS_SVC[detailItem.status]?.label} color={STATUS_SVC[detailItem.status]?.color}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[["Data",fmtD(detailItem.date)],["Horário",detailItem.time||"—"],["Cliente",detailItem.client],["Responsável",detailItem.responsible],["Previsto",fmt(detailItem.valuePlanned)],["Realizado",fmt(detailItem.valueActual)]].map(([l,v])=>(
              <div key={l} style={{background:C.surfaceMid,borderRadius:9,padding:"10px 14px"}}>
                <p style={{margin:"0 0 3px",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</p>
                <p style={{margin:0,fontSize:13,fontWeight:700,color:C.white}}>{v}</p>
              </div>

            <FF label="Status"><select style={S.select} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{Object.entries(STATUS_SVC).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></FF>
            <FF label="Data"><input type="date" style={S.input} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></FF>
            <FF label="Horário"><input type="time" style={S.input} value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/></FF>
            <FF label="Cliente / Local"><input style={S.input} value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Nome do cliente"/></FF>
            <FF label="Responsável"><select style={S.select} value={form.responsible} onChange={e=>setForm(f=>({...f,responsible:e.target.value}))}>{["Pedro","Lucas","Rodrigo"].map(r=><option key={r}>{r}</option>)}</select></FF>
            <FF label="Valor Previsto (R$)"><input type="number" style={S.input} value={form.valuePlanned} onChange={e=>setForm(f=>({...f,valuePlanned:e.target.value}))} placeholder="0,00"/></FF>
            <FF label="Valor Realizado (R$)"><input type="number" style={S.input} value={form.valueActual} onChange={e=>setForm(f=>({...f,valueActual:e.target.value}))} placeholder="0,00"/></FF>
            <div style={{gridColumn:"1 / -1"}}><FF label="Descrição / Observações"><textarea style={{...S.input,resize:"vertical",minHeight:70}} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Detalhes do serviço..."/></FF></div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button style={S.btn} onClick={save}><Ico.Check z={14} c="#07111F"/>{editItem?"Salvar Alterações":"Criar Serviço"}</button>
            <button style={S.btnGhost} onClick={()=>setModalOpen(false)}>Cancelar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── ABA FLUXO DE CAIXA ────────────────────────────────────────────────────────
function FluxoCaixaTab({cashflow,setCashflow,services}){
  const[fType,setFType]=useState("");
  const[fCat,setFCat]=useState("");
  const[modalOpen,setModalOpen]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const empty={date:"",type:"entrada",category:"Serviço",serviceId:"",description:"",value:"",payment:"PIX",notes:""};
  const[form,setForm]=useState(empty);

  const openCreate=()=>{setEditItem(null);setForm(empty);setModalOpen(true);};
  const openEdit=item=>{setEditItem(item);setForm({...item,serviceId:item.serviceId||""});setModalOpen(true);};
  const del=id=>setCashflow(s=>s.filter(x=>x.id!==id));
  const save=()=>{
    if(!form.description||!form.value)return;
    const obj={...form,value:Number(form.value),serviceId:form.serviceId?Number(form.serviceId):null};
    if(editItem)setCashflow(s=>s.map(x=>x.id===editItem.id?{...x,...obj}:x));
    else setCashflow(s=>[...s,{...obj,id:genId()}]);
    setModalOpen(false);
  };

  const totalIn=cashflow.filter(e=>e.type==="entrada").reduce((a,e)=>a+e.value,0);
  const totalOut=cashflow.filter(e=>e.type==="saida").reduce((a,e)=>a+e.value,0);
  const balance=totalIn-totalOut;
  const perP=balance/3;

  const chartData=useMemo(()=>{
    const result=[];
    for(let i=3;i>=0;i--){
      let mm=M-i,yy=Y;
      if(mm<0){mm+=12;yy--;}
      const label=MONTHS_PT[mm].slice(0,3);
      const entries=cashflow.filter(e=>{const[ey,em]=e.date.split("-").map(Number);return ey===yy&&em-1===mm;});
      const Entradas=entries.filter(e=>e.type==="entrada").reduce((a,e)=>a+e.value,0);
      const Saidas=entries.filter(e=>e.type==="saida").reduce((a,e)=>a+e.value,0);
      result.push({mes:label,Entradas,Saidas,Saldo:Entradas-Saidas});
    }
    return result;
  },[cashflow]);

  const catData=useMemo(()=>{
    const cats={};
    cashflow.filter(e=>e.type==="saida").forEach(e=>{cats[e.category]=(cats[e.category]||0)+e.value;});
    return Object.entries(cats).map(([name,value])=>({name,value}));
  },[cashflow]);

  const filtered=cashflow.filter(e=>{
    if(fType&&e.type!==fType)return false;
    if(fCat&&e.category!==fCat)return false;
    return true;
  });

  const cashCats=[...new Set(cashflow.map(e=>e.category))];

  return(
    <div>
      <SectionHeader title="Fluxo de Caixa" subtitle="Controle financeiro completo" action={<button style={S.btn} onClick={openCreate}><Ico.Plus z={15} c="#07111F"/>Novo Lançamento</button>}/>
      <div style={{display:"flex",gap:14,marginBottom:22,flexWrap:"wrap"}}>
        <StatCard label="Total Entradas" value={fmt(totalIn)} icon={<Ico.Up z={16} c={C.success}/>} color={C.success} sub="Receita total"/>
        <StatCard label="Total Saídas" value={fmt(totalOut)} icon={<Ico.Down z={16} c={C.danger}/>} color={C.danger} sub="Despesas totais"/>
        <StatCard label="Saldo Atual" value={fmt(balance)} icon={<Ico.Dollar z={16} c={C.gold}/>} color={C.gold} sub={balance>=0?"Positivo":"Negativo"} trend={balance>=0?"up":"down"}/>
      </div>
      {/* Lucro por sócio */}
      <div style={{...S.card,marginBottom:22,borderColor:`${C.gold}40`}}>
        <p style={{fontSize:10,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 16px"}}>Distribuição de Lucro — 3 Sócios</p>
        <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:130,textAlign:"center",background:C.surfaceMid,borderRadius:12,padding:"16px"}}>
            <p style={{margin:"0 0 4px",fontSize:20,fontWeight:800,color:C.gold}}>{fmt(balance)}</p>
            <p style={{margin:0,fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700}}>Lucro Total</p>
          </div>
          {["Pedro","Lucas","Rodrigo"].map((name,i)=>(
            <div key={name} style={{flex:1,minWidth:130,textAlign:"center",background:C.surfaceMid,borderRadius:12,padding:"16px",borderTop:`3px solid ${[C.gold,C.info,C.success][i]}`}}>
              <p style={{margin:"0 0 4px",fontSize:18,fontWeight:800,color:[C.gold,C.info,C.success][i]}}>{fmt(perP)}</p>
              <p style={{margin:"0 0 2px",fontSize:13,color:C.white,fontWeight:600}}>{name}</p>
              <p style={{margin:0,fontSize:10,color:C.muted}}>1/3 do lucro</p>
            </div>
          ))}
        </div>
      </div>
      {/* Gráficos */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:22}}>
        <div style={S.card}>
          <p style={{fontSize:13,fontWeight:700,color:C.white,margin:"0 0 14px"}}>Entradas × Saídas por Mês</p>
          <div style={{display:"flex",gap:12,marginBottom:10}}>
            <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.muted}}><span style={{width:10,height:10,borderRadius:2,background:C.success,display:"inline-block"}}/> Entradas</span>
            <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.muted}}><span style={{width:10,height:10,borderRadius:2,background:C.danger,display:"inline-block"}}/> Saídas</span>
          </div>
          <BarChartComp data={chartData}/>
        </div>
        <div style={S.card}>
          <p style={{fontSize:13,fontWeight:700,color:C.white,margin:"0 0 14px"}}>Evolução do Saldo</p>
          <div style={{display:"flex",gap:12,marginBottom:10}}>
            <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.muted}}><span style={{width:10,height:10,borderRadius:2,background:C.gold,display:"inline-block"}}/> Saldo Mensal</span>
          </div>
          <LineChartComp data={chartData}/>
        </div>
        <div style={S.card}>
          <p style={{fontSize:13,fontWeight:700,color:C.white,margin:"0 0 14px"}}>Distribuição de Despesas</p>
          {catData.length>0?<PieChartComp data={catData}/>:<p style={{color:C.muted,fontSize:13}}>Nenhuma despesa registrada</p>}
        </div>
        <div style={S.card}>
          <p style={{fontSize:13,fontWeight:700,color:C.white,margin:"0 0 14px"}}>Resumo Trimestral</p>
          {chartData.map((d,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,background:C.surfaceMid,borderRadius:9,padding:"10px 14px",flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:13,fontWeight:700,color:C.white,minWidth:36}}>{d.mes}</span>
              <span style={{fontSize:12,color:C.success}}>↑ {fmt(d.Entradas)}</span>
              <span style={{fontSize:12,color:C.danger}}>↓ {fmt(d.Saidas)}</span>
              <span style={{fontSize:12,fontWeight:700,color:d.Saldo>=0?C.gold:C.danger}}>{fmt(d.Saldo)}</span>
            </div>
          ))}
        </div>
      </div>
      {/* Filtros tabela */}
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <select style={{...S.select,flex:1,minWidth:140}} value={fType} onChange={e=>setFType(e.target.value)}>
          <option value="">Todos os Tipos</option>
          <option value="entrada">Entradas</option>
          <option value="saida">Saídas</option>
        </select>
        <select style={{...S.select,flex:1,minWidth:160}} value={fCat} onChange={e=>setFCat(e.target.value)}>
          <option value="">Todas Categorias</option>
          {cashCats.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>
      {/* Tabela */}
      <div style={{...S.card,padding:0,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
            <thead>
              <tr style={{background:C.surfaceMid}}>
                {["Data","Tipo","Categoria","Descrição","Valor","Pagamento",""].map(h=>(
                  <th key={h} style={{padding:"12px 14px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.sort((a,b)=>b.date.localeCompare(a.date)).map((entry,i)=>(
                <tr key={entry.id} className="table-row" style={{borderTop:`1px solid ${C.border}`,background:i%2===0?"transparent":`${C.surfaceMid}40`,transition:"background 0.12s"}}>
                  <td style={{padding:"11px 14px",fontSize:12,color:C.mutedLight,whiteSpace:"nowrap"}}>{fmtD(entry.date)}</td>
                  <td style={{padding:"11px 14px"}}><Badge label={entry.type==="entrada"?"↑ Entrada":"↓ Saída"} color={entry.type==="entrada"?C.success:C.danger}/></td>
                  <td style={{padding:"11px 14px",fontSize:12,color:C.mutedLight}}>{entry.category}</td>
                  <td style={{padding:"11px 14px",fontSize:13,color:C.white,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.description}</td>
                  <td style={{padding:"11px 14px",fontSize:13,fontWeight:800,color:entry.type==="entrada"?C.success:C.danger,whiteSpace:"nowrap"}}>{entry.type==="entrada"?"+":"-"}{fmt(entry.value)}</td>
                  <td style={{padding:"11px 14px",fontSize:12,color:C.muted}}>{entry.payment}</td>
                  <td style={{padding:"11px 14px"}}>
                    <div style={{display:"flex",gap:4}}>
                      <button className="action-btn" style={{background:"transparent",border:"none",cursor:"pointer",color:C.muted,padding:5,borderRadius:6,transition:"background 0.12s"}} onClick={()=>openEdit(entry)}><Ico.Edit z={14}/></button>
                      <button className="action-btn" style={{background:"transparent",border:"none",cursor:"pointer",color:C.danger,padding:5,borderRadius:6,transition:"background 0.12s"}} onClick={()=>del(entry.id)}><Ico.Trash z={14}/></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length===0&&<div style={{padding:30,textAlign:"center",color:C.muted,fontSize:14}}>Nenhum lançamento encontrado</div>}
        </div>
      </div>

      {modalOpen&&(
        <Modal title={editItem?"Editar Lançamento":"Novo Lançamento"} onClose={()=>setModalOpen(false)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <FF label="Data"><input type="date" style={S.input} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></FF>
            <FF label="Tipo"><select style={S.select} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}><option value="entrada">Entrada</option><option value="saida">Saída</option></select></FF>
            <FF label="Categoria"><select style={S.select} value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{["Serviço","Material","Mão de Obra","Combustível","Ferramentas","Adiantamento","Outros"].map(c=><option key={c}>{c}</option>)}</select></FF>
            <FF label="Valor (R$)"><input type="number" style={S.input} value={form.value} onChange={e=>setForm(f=>({...f,value:e.target.value}))} placeholder="0,00"/></FF>
            <div style={{gridColumn:"1 / -1"}}><FF label="Descrição"><input style={S.input} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Descrição do lançamento"/></FF></div>
            <FF label="Serviço Vinculado"><select style={S.select} value={form.serviceId} onChange={e=>setForm(f=>({...f,serviceId:e.target.value}))}><option value="">Nenhum</option>{services.map(sv=><option key={sv.id} value={sv.id}>{sv.name}</option>)}</select></FF>
            <FF label="Forma de Pagamento"><select style={S.select} value={form.payment} onChange={e=>setForm(f=>({...f,payment:e.target.value}))}>{["PIX","Transferência","Cartão","Cheque","Dinheiro"].map(p=><option key={p}>{p}</option>)}</select></FF>
          </div>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button style={S.btn} onClick={save}><Ico.Check z={14} c="#07111F"/>{editItem?"Salvar":"Lançar"}</button>
            <button style={S.btnGhost} onClick={()=>setModalOpen(false)}>Cancelar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── ABA FORNECEDORES ──────────────────────────────────────────────────────────
function FornecedoresTab({suppliers,setSuppliers}){
  const[search,setSearch]=useState("");
  const[fType,setFType]=useState("");
  const[fSt,setFSt]=useState("");
  const[modalOpen,setModalOpen]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const empty={name:"",serviceType:"Pintura",contact:"",city:"",status:"ativo",rating:5,lastService:"",notes:""};
  const[form,setForm]=useState(empty);

  const openCreate=()=>{setEditItem(null);setForm(empty);setModalOpen(true);};
  const openEdit=item=>{setEditItem(item);setForm({...item});setModalOpen(true);};
  const del=id=>setSuppliers(s=>s.filter(x=>x.id!==id));
  const save=()=>{
    if(!form.name)return;
    if(editItem)setSuppliers(s=>s.map(x=>x.id===editItem.id?{...x,...form}:x));
    else setSuppliers(s=>[...s,{...form,id:genId()}]);
    setModalOpen(false);
  };

  const svcTypes=[...new Set(suppliers.map(s=>s.serviceType))];
  const filtered=suppliers.filter(s=>{
    if(search&&!s.name.toLowerCase().includes(search.toLowerCase())&&!s.serviceType.toLowerCase().includes(search.toLowerCase()))return false;
    if(fType&&s.serviceType!==fType)return false;
    if(fSt&&s.status!==fSt)return false;
    return true;
  });

  return(
    <div>
      <SectionHeader title="Fornecedores" subtitle="Cadastro e histórico de parceiros" action={<button style={S.btn} onClick={openCreate}><Ico.Plus z={15} c="#07111F"/>Novo Fornecedor</button>}/>
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:200,position:"relative"}}>
          <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Ico.Search z={15} c={C.muted}/></div>
          <input style={{...S.input,paddingLeft:36}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar fornecedor..."/>
        </div>
        <select style={{...S.select,flex:1,minWidth:140}} value={fType} onChange={e=>setFType(e.target.value)}><option value="">Todos os Tipos</option>{svcTypes.map(t=><option key={t}>{t}</option>)}</select>
        <select style={{...S.select,flex:1,minWidth:120}} value={fSt} onChange={e=>setFSt(e.target.value)}><option value="">Todos Status</option><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
        {filtered.map(sup=>(
          <div key={sup.id} className="supplier-card" style={{...S.card,padding:"18px 20px",transition:"border-color 0.15s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div style={{display:"flex",gap:11,alignItems:"center",flex:1}}>
                <div style={{width:42,height:42,borderRadius:12,background:`${C.gold}18`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:16,fontWeight:900,color:C.gold}}>{sup.name.charAt(0)}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontWeight:700,fontSize:14,color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sup.name}</p>
                  <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>{sup.serviceType}</p>
                </div>
              </div>
              <Badge label={sup.status==="ativo"?"Ativo":"Inativo"} color={sup.status==="ativo"?C.success:C.muted}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{background:C.surfaceMid,borderRadius:8,padding:"8px 10px"}}><p style={{margin:"0 0 2px",fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>Contato</p><p style={{margin:0,fontSize:12,color:C.white}}>{sup.contact}</p></div>
              <div style={{background:C.surfaceMid,borderRadius:8,padding:"8px 10px"}}><p style={{margin:"0 0 2px",fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>Cidade</p><p style={{margin:0,fontSize:12,color:C.white}}>{sup.city}</p></div>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",gap:2}}>{Array.from({length:5}).map((_,i)=><Ico.Star key={i} z={13} c={i<sup.rating?C.gold:C.border} fill={i<sup.rating?C.gold:"none"}/>)}</div>
              <span style={{fontSize:10,color:C.muted}}>{sup.lastService?`Último: ${fmtD(sup.lastService)}`:"Sem serviços"}</span>
            </div>
            {sup.notes&&<p style={{margin:"0 0 12px",fontSize:11,color:C.muted,fontStyle:"italic",lineHeight:1.4}}>{sup.notes}</p>}
            <div style={{display:"flex",gap:8,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
              <button className="action-btn" style={{...S.btnGhost,fontSize:12,padding:"6px 12px",transition:"background 0.12s"}} onClick={()=>openEdit(sup)}><Ico.Edit z={13}/> Editar</button>
              <button className="action-btn" style={{background:"transparent",border:"none",cursor:"pointer",color:C.danger,padding:"6px 10px",borderRadius:8,fontSize:12,display:"flex",alignItems:"center",gap:5,transition:"background 0.12s"}} onClick={()=>del(sup.id)}><Ico.Trash z={13}/> Excluir</button>

            <FF label="Tipo de Serviço"><select style={S.select} value={form.serviceType} onChange={e=>setForm(f=>({...f,serviceType:e.target.value}))}>{["Pintura","Ferramentas","Elétrica","Limpeza","Reforma","Hidráulica","Outros"].map(t=><option key={t}>{t}</option>)}</select></FF>
            <FF label="Status"><select style={S.select} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select></FF>
            <FF label="Contato"><input style={S.input} value={form.contact} onChange={e=>setForm(f=>({...f,contact:e.target.value}))} placeholder="(11) 99999-9999"/></FF>
            <FF label="Cidade"><input style={S.input} value={form.city} onChange={e=>setForm(f=>({...f,city:e.target.value}))} placeholder="São Paulo"/></FF>
            <FF label="Avaliação"><select style={S.select} value={form.rating} onChange={e=>setForm(f=>({...f,rating:Number(e.target.value)}))}>{[5,4,3,2,1].map(r=><option key={r} value={r}>{"★".repeat(r)} ({r}/5)</option>)}</select></FF>
            <FF label="Último Serviço"><input type="date" style={S.input} value={form.lastService} onChange={e=>setForm(f=>({...f,lastService:e.target.value}))}/></FF>
            <div style={{gridColumn:"1 / -1"}}><FF label="Observações"><textarea style={{...S.input,resize:"vertical",minHeight:70}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Histórico, condições, notas importantes..."/></FF></div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button style={S.btn} onClick={save}><Ico.Check z={14} c="#07111F"/>{editItem?"Salvar":"Cadastrar"}</button>
            <button style={S.btnGhost} onClick={()=>setModalOpen(false)}>Cancelar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── ABA ORÇAMENTOS ────────────────────────────────────────────────────────────
function OrcamentosTab({budgets,setBudgets,services}){
  const[search,setSearch]=useState("");
  const[fSt,setFSt]=useState("");
  const[fCat,setFCat]=useState("");
  const[modalOpen,setModalOpen]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const empty={serviceName:"",client:"",category:"Reforma",date:"",pdfFile:"",pptFile:"",status:"em_analise",value:"",notes:"",serviceId:""};
  const[form,setForm]=useState(empty);

  const openCreate=()=>{setEditItem(null);setForm(empty);setModalOpen(true);};
  const openEdit=item=>{setEditItem(item);setForm({...item,serviceId:item.serviceId||""});setModalOpen(true);};
  const del=id=>setBudgets(s=>s.filter(x=>x.id!==id));
  const save=()=>{
    if(!form.serviceName)return;
    const obj={...form,value:Number(form.value),serviceId:form.serviceId?Number(form.serviceId):null};
    if(editItem)setBudgets(s=>s.map(x=>x.id===editItem.id?{...x,...obj}:x));
    else setBudgets(s=>[...s,{...obj,id:genId()}]);
    setModalOpen(false);
  };

  const totalAprov=budgets.filter(b=>b.status==="aprovado").reduce((a,b)=>a+b.value,0);
  const countSt=st=>budgets.filter(b=>b.status===st).length;

  const filtered=budgets.filter(b=>{
    if(search&&!b.serviceName.toLowerCase().includes(search.toLowerCase())&&!b.client.toLowerCase().includes(search.toLowerCase()))return false;
    if(fSt&&b.status!==fSt)return false;
    if(fCat&&b.category!==fCat)return false;
    return true;
  });

  return(
    <div>
      <SectionHeader title="Orçamentos" subtitle="Histórico e gestão de propostas" action={<button style={S.btn} onClick={openCreate}><Ico.Plus z={15} c="#07111F"/>Novo Orçamento</button>}/>
      <div style={{display:"flex",gap:14,marginBottom:22,flexWrap:"wrap"}}>
        <StatCard label="Aprovados" value={countSt("aprovado")} icon={<Ico.Check z={16} c={C.success}/>} color={C.success} sub={`${fmt(totalAprov)} aprovados`}/>
        <StatCard label="Em Análise" value={countSt("em_analise")} icon={<Ico.Clock z={16} c={C.warning}/>} color={C.warning} sub="Aguardando"/>
        <StatCard label="Reprovados" value={countSt("reprovado")} icon={<Ico.X z={16} c={C.danger}/>} color={C.danger} sub="Não convertidos"/>
        <StatCard label="Total Aprovado" value={fmt(totalAprov)} icon={<Ico.Dollar z={16} c={C.gold}/>} color={C.gold}/>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{flex:2,minWidth:200,position:"relative"}}>
          <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Ico.Search z={15} c={C.muted}/></div>
          <input style={{...S.input,paddingLeft:36}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por serviço ou cliente..."/>
        </div>
        <select style={{...S.select,flex:1,minWidth:140}} value={fSt} onChange={e=>setFSt(e.target.value)}><option value="">Todos os Status</option>{Object.entries(STATUS_BUD).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
        <select style={{...S.select,flex:1,minWidth:160}} value={fCat} onChange={e=>setFCat(e.target.value)}><option value="">Todas Categorias</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {filtered.sort((a,b)=>b.date.localeCompare(a.date)).map(budget=>{
          const st=STATUS_BUD[budget.status];
          const linkedSvc=services.find(s=>s.id===budget.serviceId);
          return(
            <div key={budget.id} style={{...S.card,padding:"18px 22px",borderLeft:`3px solid ${st?.color||C.border}`}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
                <div style={{width:44,height:44,borderRadius:12,background:`${CAT_COLORS[budget.category]||C.muted}18`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <CatIcon category={budget.category} z={20}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                    <span style={{fontWeight:800,fontSize:14,color:C.white}}>{budget.serviceName}</span>
                    <Badge label={st?.label} color={st?.color}/>
                    <Badge label={budget.category} color={CAT_COLORS[budget.category]||C.muted}/>
                  </div>
                  <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:6}}>
                    <span style={{fontSize:12,color:C.muted}}><b style={{color:C.mutedLight}}>Cliente:</b> {budget.client}</span>
                    <span style={{fontSize:12,color:C.muted}}><b style={{color:C.mutedLight}}>Data:</b> {fmtD(budget.date)}</span>
                    <span style={{fontSize:13,fontWeight:800,color:C.gold}}>{fmt(budget.value)}</span>
                    {linkedSvc&&<span style={{fontSize:11,color:C.info}}>→ {linkedSvc.name}</span>}
                  </div>
                  {budget.notes&&<p style={{margin:"0 0 8px",fontSize:12,color:C.muted,fontStyle:"italic"}}>{budget.notes}</p>}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {budget.pdfFile&&<div style={{display:"flex",alignItems:"center",gap:5,background:`${C.danger}15`,border:`1px solid ${C.danger}30`,borderRadius:7,padding:"4px 10px"}}><Ico.File z={13} c={C.danger}/><span style={{fontSize:11,color:C.danger,fontWeight:600}}>{budget.pdfFile}</span></div>}
                    {budget.pptFile&&<div style={{display:"flex",alignItems:"center",gap:5,background:`${C.warning}15`,border:`1px solid ${C.warning}30`,borderRadius:7,padding:"4px 10px"}}><Ico.File z={13} c={C.warning}/><span style={{fontSize:11,color:C.warning,fontWeight:600}}>{budget.pptFile}</span></div>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button className="action-btn" style={{...S.btnGhost,padding:"7px 10px",transition:"background 0.12s"}} onClick={()=>openEdit(budget)}><Ico.Edit z={13}/></button>
                  <button className="action-btn" style={{background:"transparent",border:"none",cursor:"pointer",color:C.danger,padding:"7px 10px",borderRadius:8,transition:"background 0.12s"}} onClick={()=>del(budget.id)}><Ico.Trash z={14}/></button>
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Nenhum orçamento encontrado</div>}
      </div>

      {modalOpen&&(
        <Modal title={editItem?"Editar Orçamento":"Novo Orçamento"} onClose={()=>setModalOpen(false)} width={620}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{gridColumn:"1 / -1"}}><FF label="Nome do Serviço"><input style={S.input} value={form.serviceName} onChange={e=>setForm(f=>({...f,serviceName:e.target.value}))} placeholder="Ex: Reforma Escritório Centro"/></FF></div>
            <FF label="Cliente / Local"><input style={S.input} value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Nome do cliente"/></FF>
            <FF label="Data"><input type="date" style={S.input} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></FF>
            <FF label="Categoria"><select style={S.select} value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></FF>
            <FF label="Status"><select style={S.select} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{Object.entries(STATUS_BUD).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></FF>
            <FF label="Valor (R$)"><input type="number" style={S.input} value={form.value} onChange={e=>setForm(f=>({...f,value:e.target.value}))} placeholder="0,00"/></FF>
            <FF label="Serviço Vinculado"><select style={S.select} value={form.serviceId} onChange={e=>setForm(f=>({...f,serviceId:e.target.value}))}><option value="">Nenhum</option>{services.map(sv=><option key={sv.id} value={sv.id}>{sv.name}</option>)}</select></FF>
            <FF label="Arquivo PDF"><input style={S.input} value={form.pdfFile} onChange={e=>setForm(f=>({...f,pdfFile:e.target.value}))} placeholder="nome.pdf"/></FF>
            <FF label="Arquivo PowerPoint"><input style={S.input} value={form.pptFile} onChange={e=>setForm(f=>({...f,pptFile:e.target.value}))} placeholder="apresentacao.pptx"/></FF>
            <div style={{gridColumn:"1 / -1"}}><FF label="Observações"><textarea style={{...S.input,resize:"vertical",minHeight:70}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notas sobre o orçamento..."/></FF></div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button style={S.btn} onClick={save}><Ico.Check z={14} c="#07111F"/>{editItem?"Salvar":"Criar Orçamento"}</button>
            <button style={S.btnGhost} onClick={()=>setModalOpen(false)}>Cancelar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({services,cashflow,budgets,setTab}){
  const totalIn=cashflow.filter(e=>e.type==="entrada").reduce((a,e)=>a+e.value,0);
  const totalOut=cashflow.filter(e=>e.type==="saida").reduce((a,e)=>a+e.value,0);
  const balance=totalIn-totalOut;
  const todaySvcs=services.filter(sv=>sv.date===todayStr);
  const pending=budgets.filter(b=>b.status==="em_analise");
  const overdue=services.filter(sv=>sv.date<todayStr&&(sv.status==="planejado"||sv.status==="em_andamento"));
  const weekStr=new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate()+7).toISOString().slice(0,10);
  const upcoming=services.filter(sv=>sv.date>todayStr&&sv.date<=weekStr&&sv.status!=="cancelado");

  return(
    <div>
      <div style={{marginBottom:28}}>
        <h2 style={{fontSize:26,fontWeight:900,color:C.white,margin:"0 0 4px"}}>Bom dia! 👋</h2>
        <p style={{fontSize:14,color:C.muted,margin:0}}>Resumo FORTLINE — {NOW.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
      </div>
      <div style={{display:"flex",gap:14,marginBottom:24,flexWrap:"wrap"}}>
        <StatCard label="Saldo Atual" value={fmt(balance)} icon={<Ico.Dollar z={16} c={C.gold}/>} color={C.gold} sub={`Entradas: ${fmt(totalIn)}`} trend={balance>=0?"up":"down"}/>
        <StatCard label="Serviços Hoje" value={todaySvcs.length} icon={<Ico.Cal z={16} c={C.info}/>} color={C.info} sub={todaySvcs.length===0?"Dia livre":todaySvcs[0]?.responsible||""}/>
        <StatCard label="Orç. Pendentes" value={pending.length} icon={<Ico.File z={16} c={C.warning}/>} color={C.warning} sub="Aguardando aprovação"/>
        <StatCard label="Atrasados" value={overdue.length} icon={<Ico.Clock z={16} c={C.danger}/>} color={C.danger} sub={overdue.length>0?"Atenção necessária":"Tudo em dia"}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:20}}>
        <div style={S.card}>
          <p style={{fontSize:13,fontWeight:700,color:C.white,margin:"0 0 16px"}}>Status dos Serviços</p>
          {Object.entries(STATUS_SVC).map(([k,v])=>{
            const count=services.filter(s=>s.status===k).length;
            const pct=services.length>0?Math.round((count/services.length)*100):0;
            return(
              <div key={k} style={{marginBottom:13}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:13,color:C.mutedLight}}>{v.label}</span>
                  <span style={{fontSize:13,fontWeight:700,color:v.color}}>{count}</span>
                </div>
                <div style={{height:5,background:C.surfaceMid,borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:v.color,borderRadius:3}}/>
                </div>
              </div>
            );
          })}
        </div>
        <div style={S.card}>
          <p style={{fontSize:13,fontWeight:700,color:C.white,margin:"0 0 14px"}}>Ações Rápidas</p>
          {[
            {label:"Agendar novo serviço",icon:<Ico.Cal z={16} c={C.info}/>,tab:"agenda",color:C.info},
            {label:"Registrar lançamento financeiro",icon:<Ico.Dollar z={16} c={C.success}/>,tab:"caixa",color:C.success},
            {label:"Cadastrar fornecedor",icon:<Ico.Users z={16} c={C.purple}/>,tab:"fornecedores",color:C.purple},
            {label:"Criar novo orçamento",icon:<Ico.File z={16} c={C.gold}/>,tab:"orcamentos",color:C.gold},
          ].map(item=>(
            <button key={item.tab} className="quick-btn" style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:C.surfaceMid,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",marginBottom:8,textAlign:"left",transition:"background 0.12s"}} onClick={()=>setTab(item.tab)}>
              <div style={{width:32,height:32,borderRadius:9,background:`${item.color}20`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{item.icon}</div>
              <span style={{fontSize:13,fontWeight:600,color:C.white}}>{item.label}</span>
              <Ico.ChevR z={14} c={C.muted}/>
            </button>
          ))}
        </div>
      </div>
      {upcoming.length>0&&(
        <div style={S.card}>
          <p style={{fontSize:13,fontWeight:700,color:C.white,margin:"0 0 14px"}}>Próximos 7 Dias</p>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            {upcoming.map(sv=>(
              <div key={sv.id} style={{background:C.surfaceMid,borderRadius:10,padding:"12px 16px",flex:"1 1 200px",borderLeft:`3px solid ${CAT_COLORS[sv.category]||C.muted}`}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}><CatIcon category={sv.category} z={14}/><span style={{fontSize:13,fontWeight:700,color:C.white}}>{sv.name}</span></div>
                <div style={{display:"flex",gap:12}}>
                  <span style={{fontSize:11,color:C.muted}}>{fmtD(sv.date)}</span>
                  <span style={{fontSize:11,color:C.muted}}>{sv.responsible}</span>
                  <span style={{fontSize:11,fontWeight:700,color:C.gold}}>{fmt(sv.valuePlanned)}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("dashboard");
  const[services,setServices]=useState(INIT_SERVICES);
  const[cashflow,setCashflow]=useState(INIT_CASHFLOW);
  const[suppliers,setSuppliers]=useState(INIT_SUPPLIERS);
  const[budgets,setBudgets]=useState(INIT_BUDGETS);
  const[sidebar,setSidebar]=useState(true);

  const navItems=[
    {id:"dashboard",label:"Dashboard",icon:<Ico.Grid z={18}/>},
    {id:"agenda",label:"Agenda de Serviços",icon:<Ico.Cal z={18}/>},
    {id:"caixa",label:"Fluxo de Caixa",icon:<Ico.Dollar z={18}/>},
    {id:"fornecedores",label:"Fornecedores",icon:<Ico.Users z={18}/>},
    {id:"orcamentos",label:"Orçamentos",icon:<Ico.File z={18}/>},
  ];
  const active=navItems.find(n=>n.id===tab);

  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
      {/* SIDEBAR */}
      <div style={{width:sidebar?230:62,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",transition:"width 0.22s ease",flexShrink:0,overflow:"hidden"}}>
        <div style={{padding:sidebar?"20px 16px":"20px 11px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:sidebar?"space-between":"center"}}>
          <Logo compact={!sidebar}/>
          {sidebar&&<button style={{background:"transparent",border:"none",cursor:"pointer",color:C.muted,padding:4,borderRadius:6,display:"flex"}} onClick={()=>setSidebar(false)}><Ico.ChevL z={16}/></button>}
        </div>
        <nav style={{flex:1,padding:"12px 8px",overflowY:"auto"}}>
          {navItems.map(item=>{
            const active2=tab===item.id;
            return(
              <button key={item.id} className="nav-btn" onClick={()=>setTab(item.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:sidebar?"10px 12px":"10px",background:active2?`${C.gold}18`:"transparent",border:`1px solid ${active2?`${C.gold}30`:"transparent"}`,borderRadius:10,cursor:"pointer",color:active2?C.gold:C.muted,fontWeight:active2?700:400,fontSize:13,marginBottom:3,justifyContent:sidebar?"flex-start":"center",transition:"all 0.15s",whiteSpace:"nowrap",overflow:"hidden"}}>
                <span style={{flexShrink:0,color:active2?C.gold:C.muted}}>{item.icon}</span>
                {sidebar&&<span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{item.label}</span>}
                {active2&&sidebar&&<div style={{width:5,height:5,borderRadius:"50%",background:C.gold,marginLeft:"auto",flexShrink:0}}/>}
              </button>
            );
          })}
        </nav>
        {sidebar?(
          <div style={{padding:"12px 18px",borderTop:`1px solid ${C.border}`}}>
            <p style={{margin:"0 0 2px",fontSize:11,color:C.muted}}>Versão 1.0.0</p>
            <p style={{margin:0,fontSize:10,color:C.border}}>FORTLINE © {Y}</p>
          </div>
        ):(
          <div style={{padding:"12px 0",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"center"}}>
            <button style={{background:"transparent",border:"none",cursor:"pointer",color:C.muted,padding:8,borderRadius:8}} onClick={()=>setSidebar(true)}><Ico.ChevR z={16}/></button>
          </div>
        )}
      </div>
      {/* CONTEÚDO */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Header */}
        <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 24px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{color:C.gold}}>{active?.icon}</span>
            <span style={{fontSize:15,fontWeight:800,color:C.white}}>{active?.label}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:12,color:C.muted}}>{NOW.toLocaleDateString("pt-BR",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</div>
            <div style={{display:"flex",gap:6}}>
              {[{tip:"Agenda",icon:<Ico.Cal z={14}/>,t:"agenda"},{tip:"Caixa",icon:<Ico.Dollar z={14}/>,t:"caixa"},{tip:"Orçamentos",icon:<Ico.File z={14}/>,t:"orcamentos"}].map(a=>(
                <button key={a.t} title={a.tip} style={{background:C.surfaceMid,border:`1px solid ${C.border}`,borderRadius:7,padding:"6px 10px",cursor:"pointer",color:C.muted,display:"flex",alignItems:"center"}} onClick={()=>setTab(a.t)}>{a.icon}</button>
              ))}
            </div>
            <div style={{width:33,height:33,borderRadius:9,background:`${C.gold}20`,border:`1.5px solid ${C.gold}40`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:12,fontWeight:800,color:C.gold}}>FL</span>
            </div>
          </div>
        </header>
        {/* Main */}
        <main style={{flex:1,overflow:"auto",padding:"26px 26px 40px"}}>
          {tab==="dashboard"&&<Dashboard services={services} cashflow={cashflow} budgets={budgets} setTab={setTab}/>}
          {tab==="agenda"&&<AgendaTab services={services} setServices={setServices}/>}
          {tab==="caixa"&&<FluxoCaixaTab cashflow={cashflow} setCashflow={setCashflow} services={services}/>}
          {tab==="fornecedores"&&<FornecedoresTab suppliers={suppliers} setSuppliers={setSuppliers}/>}
          {tab==="orcamentos"&&<OrcamentosTab budgets={budgets} setBudgets={setBudgets} services={services}/>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
